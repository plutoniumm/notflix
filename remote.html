<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controls</title>
  <style>
    :root {
      --bg: #141414;
      --fg: #ffffff;
      --muted: #8c8c8c;
      --red: #e50914;
      --btn: #222;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    input[type="number"] {
      width: 72px;
      background: #000;
      color: var(--fg);
      border: 1px solid var(--muted);
      border-radius: 6px;
      padding: 6px;
      text-align: center;
      font-size: 16px;
    }

    button {
      background: var(--red);
      border-radius: 20px;
      width: 75px;
      aspect-ratio: 1;
      color: #fff;
      border: none;
      font-size: 20px;
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>
  <div class="controls">
    <div class="side">
      <button id="leftBtn">←</button>
      <input id="leftNum" type="number" value="10" />
    </div>

    <button id="playBtn" class="play">⏯</button>

    <div class="side">
      <button id="rightBtn">→</button>
      <input id="rightNum" type="number" value="10" />
    </div>
  </div>

  <script>
    async function send ( cmd ) {
      await fetch( "/cmd", {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: cmd
      } );
    }

    document.getElementById( "playBtn" ).onclick = e => {
      send( "tog" );
    };

    document.getElementById( "leftBtn" ).onclick = () => {
      send( "-" + document.getElementById( "leftNum" ).value );
    };

    document.getElementById( "rightBtn" ).onclick = () => {
      send( "+" + document.getElementById( "rightNum" ).value );
    };
  </script>
</body>

</html>
